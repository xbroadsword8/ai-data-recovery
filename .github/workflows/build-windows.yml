# GitHub Actions Workflow for Building Windows Executable
# 自動化生成 AI Data Recovery Windows .exe

name: Build Windows Executable

# 觸發條件
on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pyinstaller requests requests-oauthlib
        shell: pwsh
      
      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name "ai-data-recovery" gui/gui_main.py
        shell: pwsh
      
      - name: Verify build
        run: |
          if (Test-Path "dist/ai-data-recovery.exe") {
            Write-Host "Build successful!"
            Get-Item "dist/ai-data-recovery.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "Build failed! File not found."
            exit 1
          }
        shell: pwsh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-data-recovery-windows
          path: dist/ai-data-recovery.exe
          retention-days: 7